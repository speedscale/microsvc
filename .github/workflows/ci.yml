name: CI/CD Pipeline

on:
  push:
    branches: [ master, develop, feature/* ]
  pull_request:
    branches: [ master, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: banking_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Setup test database
      run: |
        PGPASSWORD=password psql -h localhost -U postgres -d banking_test -c "
          CREATE SCHEMA IF NOT EXISTS user_service;
          CREATE SCHEMA IF NOT EXISTS accounts_service;
          CREATE SCHEMA IF NOT EXISTS transactions_service;
        "
    
    - name: Test Backend Services
      run: make test-backend

  test-frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Test Frontend
      run: make test-frontend

  proxymock-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Proxymock validation (install, init, build, mock+replay)
      env:
        PROXYMOCK_API_KEY: ${{ secrets.PROXYMOCK_API_KEY }}
      run: ./scripts/run-proxymock-validation.sh
  
  test-go-services:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: backend/fraud-service/go.mod
        cache-dependency-path: |
          backend/fraud-service/go.sum
          backend/notification-service/go.sum

    - name: Test fraud-service
      run: |
        cd backend/fraud-service
        go test ./...

    - name: Test notification-service
      run: |
        cd backend/notification-service
        go test ./...

  build-and-push:
    needs: [test-backend, test-frontend, test-go-services]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        service:
          - user-service
          - accounts-service
          - transactions-service
          - api-gateway
          - frontend
          - simulation-client
          - fraud-service
          - notification-service
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Get version
      id: version
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
          # On master: auto-increment patch unless VERSION was manually bumped
          if git diff HEAD~1 --name-only 2>/dev/null | grep -q '^VERSION$'; then
            echo "VERSION manually bumped in this commit, using as-is"
            VERSION=$(./scripts/version.sh get)
          else
            CURRENT=$(./scripts/version.sh get)
            IFS='.' read -r major minor patch <<< "$CURRENT"
            VERSION="${major}.${minor}.$((patch + 1))"
            echo "Auto-incrementing to $VERSION for deploy"
          fi
        else
          VERSION=$(./scripts/version.sh get)
        fi
        SIMPLE_TAG="v${VERSION}"
        SHA_TAG="v${VERSION}-$(git rev-parse --short HEAD)"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "simple_tag=$SIMPLE_TAG" >> $GITHUB_OUTPUT
        echo "sha_tag=$SHA_TAG" >> $GITHUB_OUTPUT
        echo "Building version: $SIMPLE_TAG ($SHA_TAG)"
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/speedscale/microsvc/${{ matrix.service }}
        tags: |
          type=raw,value=${{ steps.version.outputs.simple_tag }}
          type=raw,value=${{ steps.version.outputs.sha_tag }}
          type=raw,value=latest,enable={{is_default_branch}}
          type=ref,event=branch
          type=ref,event=pr
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ 
          matrix.service == 'frontend' && './frontend' || 
          matrix.service == 'simulation-client' && './simulation-client' ||
          format('./backend/{0}', matrix.service) }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  update-k8s-manifests:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Auto-bump and sync all versions
      run: |
        # Auto-increment patch unless VERSION was manually bumped in this merge
        if git diff HEAD~1 --name-only 2>/dev/null | grep -q '^VERSION$'; then
          echo "VERSION manually bumped in this commit, syncing manifests only"
        else
          ./scripts/version.sh bump patch
        fi

        NEW_TAG=$(./scripts/version.sh tag)
        echo "Releasing $NEW_TAG"

        make update-k8s-version
        make update-frontend-version
        make update-backend-version

        # Always commit — the bump itself guarantees a diff
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add VERSION kubernetes/base/deployments/ frontend/package.json simulation-client/package.json backend/*/pom.xml

        if git diff --cached --quiet; then
          echo "No changes to commit (manifests already at $NEW_TAG)"
          exit 0
        fi

        git commit -m "CI: release $NEW_TAG [skip ci]"

        # Retry with rebase if another merge landed between build and now
        for i in 1 2 3; do
          if git push; then
            echo "Released $NEW_TAG"
            exit 0
          fi
          echo "Push conflicted, rebasing (attempt $i/3)..."
          git pull --rebase origin master
        done
        echo "Failed to push after 3 attempts"
        exit 1

  e2e-test:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 20
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: |
          ~/.cache/playwright
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-playwright-
    
    - name: Install dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Install Playwright browsers
      run: |
        cd frontend
        npx playwright install --with-deps chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
    
    - name: Create test results directory
      run: |
        cd frontend
        mkdir -p test-results
    
    - name: Run simplified E2E tests
      run: |
        cd frontend
        npm run test:e2e:ci
      timeout-minutes: 15
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          frontend/playwright-report/
          frontend/test-results/
        retention-days: 30
