apiVersion: apps/v1
kind: Deployment
metadata:
  name: tlsload-agent
  namespace: otel-tls-repro
  labels:
    app: tlsload
    variant: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tlsload
      variant: agent
  template:
    metadata:
      labels:
        app: tlsload
        variant: agent
    spec:
      initContainers:
      - name: nettap-agent-installer
        image: gcr.io/speedscale/nettap:v0.1.25
        command: ["cp", "/usr/local/share/nettap-agent.jar", "/nettap-agent/nettap-agent.jar"]
        volumeMounts:
        - name: nettap-agent
          mountPath: /nettap-agent
      containers:
      - name: client
        image: eclipse-temurin:21-jdk
        command: ["sh", "-c"]
        args:
        - |
          keytool -genkeypair -alias t -keyalg RSA -keysize 2048 -keystore /tmp/ks.p12 \
            -storetype PKCS12 -storepass changeit -dname "CN=localhost" \
            -ext SAN=dns:localhost -validity 2
          exec java -javaagent:/nettap-agent/nettap-agent.jar=speedscale-nettap.speedscale:8000 /app/TlsLoad.java
        env:
        - name: REPRO_MODE
          value: agent
        - name: THREADS
          value: "32"
        volumeMounts:
        - name: src
          mountPath: /app
        - name: nettap-agent
          mountPath: /nettap-agent
          readOnly: true
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "2"
            memory: "1Gi"
      volumes:
      - name: src
        configMap:
          name: treasury-client-src
      - name: nettap-agent
        emptyDir: {}
