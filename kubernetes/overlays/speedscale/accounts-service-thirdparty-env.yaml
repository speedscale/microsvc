apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-accounts
  namespace: banking-app
spec:
  template:
    spec:
      containers:
      - name: accounts-service
        imagePullPolicy: IfNotPresent
        env:
        - name: PLAID_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: banking-thirdparty-keys
              key: PLAID_CLIENT_ID
        - name: PLAID_SECRET
          valueFrom:
            secretKeyRef:
              name: banking-thirdparty-keys
              key: PLAID_SECRET
        - name: EXCHANGE_RATES_APP_ID
          valueFrom:
            secretKeyRef:
              name: banking-thirdparty-keys
              key: EXCHANGE_RATES_APP_ID
        - name: MOODYS_API_KEY
          valueFrom:
            secretKeyRef:
              name: banking-thirdparty-keys
              key: MOODYS_API_KEY
        # Statement export is left unconfigured in this overlay because there
        # is no object store backing the upload path.
