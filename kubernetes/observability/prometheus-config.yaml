apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
  labels:
    app: prometheus
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: observability
    app.kubernetes.io/version: v1.0.0
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Services were renamed with the banking- prefix and all expose port 80.
      - job_name: 'user-service'
        static_configs:
          - targets: ['banking-user.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'accounts-service'
        static_configs:
          - targets: ['banking-accounts.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'transactions-service'
        static_configs:
          - targets: ['banking-transactions.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'api-gateway'
        static_configs:
          - targets: ['banking-gateway.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'fraud-service'
        static_configs:
          - targets: ['banking-fraud.banking-app:9091']
        metrics_path: '/metrics'
        scrape_interval: 30s

      - job_name: 'notification-service'
        static_configs:
          - targets: ['banking-notification.banking-app:80']
        metrics_path: '/metrics'
        scrape_interval: 30s

      - job_name: 'ai-service'
        static_configs:
          - targets: ['banking-ai.banking-app:8080']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s