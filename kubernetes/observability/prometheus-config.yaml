apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
  labels:
    app: prometheus
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: observability
    app.kubernetes.io/version: v1.0.0
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Services were renamed with the banking- prefix and all expose port 80.
      - job_name: 'user-service'
        static_configs:
          - targets: ['banking-user.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'accounts-service'
        static_configs:
          - targets: ['banking-accounts.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'transactions-service'
        static_configs:
          - targets: ['banking-transactions.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'api-gateway'
        static_configs:
          - targets: ['banking-gateway.banking-app:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'fraud-service'
        static_configs:
          - targets: ['banking-fraud.banking-app:9091']
        metrics_path: '/metrics'
        scrape_interval: 30s

      - job_name: 'notification-service'
        static_configs:
          - targets: ['banking-notification.banking-app:80']
        metrics_path: '/metrics'
        scrape_interval: 30s

      - job_name: 'ai-service'
        static_configs:
          - targets: ['banking-ai.banking-app:8080']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      # Node-level host metrics (memory, CPU, disk, network, load) from
      # node-exporter — one pod per node, host-network so we can hit each
      # one at its node IP:9100 via the headless Service endpoints.
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['observability']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: node-exporter;metrics
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
        scrape_interval: 30s

      # Per-container CPU + memory from kubelet's built-in cAdvisor endpoint.
      # Discovers all nodes via the apiserver, proxies through it to reach
      # /metrics/cadvisor on each kubelet (auth via SA token + apiserver CA).
      - job_name: 'kubelet-cadvisor'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          # Drop ephemeral / mostly-noise series so we don't blow up storage.
          - source_labels: [__name__]
            regex: 'container_(blkio|fs|network)_.*'
            action: drop
          # Limit to banking-app + observability namespaces — we don't need
          # control-plane container metrics on the demo dashboards.
          - source_labels: [namespace]
            regex: 'banking-app|observability'
            action: keep
        scrape_interval: 30s