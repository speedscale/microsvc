apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: banking-app
  labels:
    app: prometheus
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: observability
    app.kubernetes.io/version: v1.0.0
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Services were renamed with the banking- prefix and all expose port 80.
      - job_name: 'user-service'
        static_configs:
          - targets: ['banking-user:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'accounts-service'
        static_configs:
          - targets: ['banking-accounts:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'transactions-service'
        static_configs:
          - targets: ['banking-transactions:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'api-gateway'
        static_configs:
          - targets: ['banking-gateway:80']
        metrics_path: '/actuator/prometheus'
        scrape_interval: 30s

      - job_name: 'fraud-service'
        static_configs:
          - targets: ['banking-fraud:9091']
        metrics_path: '/metrics'
        scrape_interval: 30s

      - job_name: 'notification-service'
        static_configs:
          - targets: ['banking-notification:80']
        metrics_path: '/metrics'
        scrape_interval: 30s