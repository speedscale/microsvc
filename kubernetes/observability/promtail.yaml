apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: observability
data:
  promtail.yaml: |
    server:
      http_listen_port: 3101
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Kubernetes pod service-discovery returns zero targets on this cluster
      # (RBAC + config are correct, but promtail 2.9.8's k8s SD silently
      # discovers nothing here). Tail the CRI pod logs straight off the mounted
      # /var/log/pods hostPath instead — deterministic and SD-free. promtail
      # runs as root and the path is mounted, so the files are readable.
      - job_name: banking-app
        static_configs:
          - targets: [localhost]
            labels:
              namespace: banking-app
              __path__: /var/log/pods/banking-app_*/*/*.log
        pipeline_stages:
          - cri: {}
          # Derive pod/container from the log file path
          # (/var/log/pods/<ns>_<pod>_<uid>/<container>/<n>.log)
          - regex:
              source: filename
              expression: '/var/log/pods/[^_]+_(?P<pod>.+)_[^_/]+/(?P<container>[^/]+)/[^/]+\.log'
          - labels:
              pod:
              container:
          # Keep the panel focused on application containers: drop the sim load
          # generator and the injected init/sidecar containers.
          - drop:
              source: container
              expression: 'simulation-client|speedscale-.*|wait-for-.*|istio-.*'
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: observability
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.8
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 3101
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: pods
              mountPath: /var/log/pods
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods
          hostPath:
            path: /var/log/pods
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, watch, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: observability
