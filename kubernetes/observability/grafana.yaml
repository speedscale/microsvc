apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: banking-app
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: false
      - name: Prometheus (App)
        uid: prometheus-app
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: false
      - name: Jaeger
        uid: jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
        isDefault: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: banking-app
data:
  providers.yaml: |
    apiVersion: 1
    providers:
      - name: speedscale-byoc
        orgId: 1
        folder: Speedscale BYOC
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/byoc
      - name: banking-app
        orgId: 1
        folder: Banking App
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: banking-app
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:13.0.2
          ports:
            - containerPort: 3000
              name: web
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_SERVER_ROOT_URL
              value: https://grafana-staging.trafficreplay.com
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards-byoc
              mountPath: /var/lib/grafana/dashboards/byoc
            - name: dashboards-app
              mountPath: /var/lib/grafana/dashboards/app
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: data
          emptyDir: {}
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards-byoc
          configMap:
            name: grafana-dashboards-byoc
        - name: dashboards-app
          configMap:
            name: grafana-dashboards-app
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: banking-app
spec:
  selector:
    app: grafana
  ports:
    - name: web
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: banking-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: grafana-staging.trafficreplay.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
