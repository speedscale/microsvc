apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: banking-app-base

resources:
  # Namespace and RBAC
  - namespace/namespace.yaml
  
  # Database
  - database/postgres-configmap.yaml
  - database/postgres-pvc.yaml
  - database/postgres-deployment.yaml
  - database/postgres-service.yaml
  - database/redis-deployment.yaml
  - database/redis-service.yaml
  - database/mongodb-deployment.yaml
  - database/mongodb-service.yaml
  
  # ConfigMaps and Secrets
  - configmaps/app-config.yaml
  - configmaps/app-secrets.yaml
  - configmaps/simulation-client-configmap.yaml
  - configmaps/simulation-client-secret.yaml
  - configmaps/ai-secret.yaml
  
  # Kafka
  - kafka/kafka-deployment.yaml
  - kafka/kafka-service.yaml

  # Microservice Deployments
  - deployments/user-service-deployment.yaml
  - deployments/accounts-service-deployment.yaml
  - deployments/transactions-service-deployment.yaml
  - deployments/fraud-service-deployment.yaml
  - deployments/notification-service-deployment.yaml
  - deployments/ai-service-deployment.yaml
  - deployments/api-gateway-deployment.yaml
  - deployments/frontend-deployment.yaml
  - deployments/simulation-client-deployment.yaml
  - deployments/simulation-client-hpa.yaml

  # Microservice Services
  - services/user-service-service.yaml
  - services/accounts-service-service.yaml
  - services/transactions-service-service.yaml
  - services/fraud-service-service.yaml
  - services/notification-service-service.yaml
  - services/ai-service-service.yaml
  - services/api-gateway-service.yaml
  - services/frontend-service.yaml
  - services/frontend-service-nodeport.yaml

  # Customer account
  - jobs/seed-user-pool.yaml

namespace: banking-app

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/version: v1.0.0
    app.kubernetes.io/managed-by: kustomize

patches:
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ignored
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "true"
- target:
    group: batch
    version: v1
    kind: Job
  patch: |-
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: ignored
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "true"
