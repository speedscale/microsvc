apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-transactions
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: microservice
    app.kubernetes.io/service: transactions-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-transactions
      app.kubernetes.io/name: banking-app
      app.kubernetes.io/component: microservice
  template:
    metadata:
      labels:
        app: banking-transactions
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: microservice
        app.kubernetes.io/service: transactions-service
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: transactions-service
        image: ghcr.io/speedscale/microsvc/transactions-service:v1.4.102
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args: ["exec java $JAVA_OPTS org.springframework.boot.loader.launch.JarLauncher"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banking-db-credentials
              key: transactions-service-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: banking-jwt-secret
              key: secret
        - name: JAVA_OPTS
          value: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=128m -XX:ReservedCodeCacheSize=32m -XX:MaxDirectMemorySize=16m -XX:+UseSerialGC -XX:+UseStringDeduplication -XX:+UseContainerSupport -Djava.security.egd=file:/dev/./urandom -Dspring.main.lazy-initialization=true"
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: banking-transactions-config
        resources:
          requests:
            memory: "384Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            # Right-sized for live sim traffic; 150m throttled the JVM (see user-service).
            cpu: "1000m"
        startupProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 90
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 240
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command: ['sh', '-c', 'echo "[transactions-service] Waiting for PostgreSQL..."; until pg_isready -h banking-postgres -p 5432 -q; do sleep 1; done; echo "[transactions-service] PostgreSQL ready!"']
