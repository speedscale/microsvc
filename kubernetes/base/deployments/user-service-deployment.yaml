apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-user
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: microservice
    app.kubernetes.io/service: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-user
      app.kubernetes.io/name: banking-app
      app.kubernetes.io/component: microservice
  template:
    metadata:
      labels:
        app: banking-user
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: microservice
        app.kubernetes.io/service: user-service
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: user-service
        image: ghcr.io/speedscale/microsvc/user-service:v1.4.32
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: banking-db-credentials
              key: user-service-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: banking-jwt-secret
              key: secret
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: banking-user-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
      initContainers:
      - name: wait-for-postgres
        image: postgres:15-alpine
        command: ['sh', '-c', 'echo "[user-service] Waiting for PostgreSQL..."; until pg_isready -h banking-postgres -p 5432 -q; do sleep 1; done; echo "[user-service] PostgreSQL ready!"']
