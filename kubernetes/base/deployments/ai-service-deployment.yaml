apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-ai
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: microservice
    app.kubernetes.io/service: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-ai
      app.kubernetes.io/name: banking-app
      app.kubernetes.io/component: microservice
  template:
    metadata:
      labels:
        app: banking-ai
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: microservice
        app.kubernetes.io/service: ai-service
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: ai-service
        image: ghcr.io/speedscale/microsvc/ai-service:v1.4.56
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: AI_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: OPENAI_API_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: GEMINI_API_KEY
        - name: XAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: XAI_API_KEY
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: OPENROUTER_API_KEY
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
