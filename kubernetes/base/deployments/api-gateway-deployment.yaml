apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-gateway
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: gateway
    app.kubernetes.io/service: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-gateway
      app.kubernetes.io/name: banking-app
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app: banking-gateway
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: gateway
        app.kubernetes.io/service: api-gateway
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: api-gateway
        image: ghcr.io/speedscale/microsvc/api-gateway:v1.4.4
        imagePullPolicy: Always
        command: ["/bin/sh", "-c"]
        args: ["exec java $JAVA_OPTS org.springframework.boot.loader.launch.JarLauncher"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: banking-jwt-secret
              key: secret
        - name: JAVA_OPTS
          value: "-Xms64m -Xmx192m -XX:MaxMetaspaceSize=96m -XX:ReservedCodeCacheSize=32m -XX:MaxDirectMemorySize=16m -XX:+UseSerialGC -XX:+UseStringDeduplication -XX:+UseContainerSupport -Djava.security.egd=file:/dev/./urandom -Dspring.main.lazy-initialization=true"
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: banking-gateway-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "50m"
          limits:
            memory: "768Mi"
            # Right-sized for live sim traffic; 150m throttled the JVM (see user-service).
            cpu: "1000m"
        startupProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 90
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 240
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
      initContainers:
      - name: wait-for-services
        image: busybox:1.35
        command: ['sh', '-c', 'echo "[api-gateway] Waiting for microservices..."; services="banking-user:80 banking-accounts:80 banking-transactions:80"; for service in $services; do while ! nc -z ${service%:*} ${service#*:}; do echo "[api-gateway] Waiting for $service..."; sleep 1; done; echo "[api-gateway] ✓ $service ready"; done; echo "[api-gateway] All services ready!"']
