apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  namespace: banking-app
  labels:
    app: banking-frontend
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: frontend
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/service: frontend
    app.kubernetes.io/version: v1.1.2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-frontend
  template:
    metadata:
      labels:
        app: banking-frontend
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: frontend
        app.kubernetes.io/service: frontend
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: frontend
        image: ghcr.io/speedscale/microsvc/frontend:v1.4.18
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: banking-frontend-config
        env:
        - name: AI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: AI_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: OPENAI_API_KEY
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: GEMINI_API_KEY
        - name: XAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: XAI_API_KEY
        - name: OPENROUTER_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-api-key
              key: OPENROUTER_API_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3