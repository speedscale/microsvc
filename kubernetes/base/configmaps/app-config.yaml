apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: config
data:
  # Database configuration
  DB_HOST: "banking-postgres"
  DB_PORT: "5432"
  DB_NAME: "banking_app"
  
  # Service URLs (for inter-service communication)
  USER_SERVICE_URL: "http://banking-user:80"
  ACCOUNTS_SERVICE_URL: "http://banking-accounts:80"
  TRANSACTIONS_SERVICE_URL: "http://banking-transactions:80"
  FRAUD_SERVICE_HOST: "banking-fraud"
  FRAUD_SERVICE_PORT: "50051"
  NOTIFICATION_SERVICE_URL: "http://banking-notification:80"
  KAFKA_BROKERS: "banking-kafka:9092"

  # Observability (language-agnostic OTel)
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
  OTEL_TRACES_EXPORTER: "otlp"
  OTEL_METRICS_EXPORTER: "otlp"
  OTEL_LOGS_EXPORTER: "otlp"
  OTEL_TRACES_SAMPLER: "always_on"
  OTEL_PROPAGATORS: "tracecontext"
  OTEL_RESOURCE_ATTRIBUTES: "service.namespace=banking-app"
---
apiVersion: v1
kind: ConfigMap
