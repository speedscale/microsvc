apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-kafka
  namespace: banking-app
  labels:
    app.kubernetes.io/name: banking-app
    app.kubernetes.io/component: messaging
    app.kubernetes.io/service: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-kafka
      app.kubernetes.io/name: banking-app
      app.kubernetes.io/component: messaging
  template:
    metadata:
      labels:
        app: banking-kafka
        app.kubernetes.io/name: banking-app
        app.kubernetes.io/component: messaging
        app.kubernetes.io/service: kafka
    spec:
      serviceAccountName: banking-app-sa
      containers:
      - name: kafka
        # bitnami/kafka:3.7 was purged from Docker Hub (Aug 2025 Bitnami repo
        # change); free tags moved to bitnamilegacy/. Pin a concrete patch.
        image: bitnamilegacy/kafka:3.7.1
        imagePullPolicy: Always
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 9093
          name: controller
        env:
        - name: KAFKA_CFG_NODE_ID
          value: "0"
        - name: KAFKA_CFG_PROCESS_ROLES
          value: "controller,broker"
        - name: KAFKA_CFG_LISTENERS
          value: "PLAINTEXT://:9092,CONTROLLER://:9093"
        - name: KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        # Single-node KRaft: the controller quorum is this pod itself. Use
        # localhost so registration doesn't depend on the ClusterIP Service
        # routing 9093 back to the same pod (the Service only exposes 9092).
        - name: KAFKA_CFG_CONTROLLER_QUORUM_VOTERS
          value: "0@localhost:9093"
        - name: KAFKA_CFG_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "300m"
        readinessProbe:
          tcpSocket:
            port: 9092
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 6
