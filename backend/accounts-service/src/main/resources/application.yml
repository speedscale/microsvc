server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: accounts-service
  
  datasource:
    url: jdbc:otel:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:banking_app}
    username: accounts_service_user
    password: accounts_service_pass
    driver-class-name: io.opentelemetry.instrumentation.jdbc.OpenTelemetryDriver
    hikari:
      minimum-idle: 0
      maximum-pool-size: 5
      initializationFailTimeout: 0
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
        boot:
          allow_jdbc_metadata_access: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: accounts_service
    user: accounts_service_user
    password: accounts_service_pass
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:banking_app}
  main:
    web-application-type: servlet

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:banking-app-super-secret-key-change-this-in-production-256-bit}
  expiration: ${JWT_EXPIRATION:86400000}

# Logging Configuration
logging:
  level:
    com.banking.accountsservice: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"
    file: "%d{HH:mm:ss.SSS} [%thread] %-5level [%X{traceId},%X{spanId}] %logger{36} - %msg%n"

# Management endpoints
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: false  # Disable Spring Boot's built-in tracing, use OpenTelemetry instead
# OpenTelemetry Configuration
otel:
  service:
    name: ${spring.application.name}
  exporter:
    otlp:
      protocol: grpc
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
      headers: {}
      timeout: 10s
      compression: none
  traces:
    exporter: otlp
    propagators: tracecontext
    sampler:
      type: always_on
      arg: 1.0
  metrics:
    exporter: otlp
  logs:
    exporter: otlp
  propagation:
    type: tracecontext
  # HTTP instrumentation configuration
  instrumentation:
    http:
      enabled: true
    jdbc:
      enabled: true
  # Span naming configuration
  span:
    name:
      pattern: "{http.method} {http.route}"