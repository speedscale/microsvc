syntax = "proto3";

package fraud.v1;

option go_package = "github.com/speedscale/microsvc/fraud-service/gen/fraud/v1;fraudv1";

service FraudChecker {
  rpc CheckTransaction(TransactionRequest) returns (FraudCheckResponse);
}

message TransactionRequest {
  string account_id = 1;
  string user_id = 2;
  double amount = 3;
  // e.g. "DEPOSIT", "WITHDRAWAL", "TRANSFER"
  string transaction_type = 4;
  // ISO 18245 merchant category code (4 digits). Used by fraud-service to
  // decide whether to escalate to external providers (Sift, Stripe Radar,
  // MaxMind) — high-risk MCCs get the full external check, low-risk ones
  // are scored on the rule engine alone.
  string merchant_category = 5;
}

message FraudCheckResponse {
  bool approved = 1;
  // risk score in range 0.0-1.0
  double risk_score = 2;
  string reason = 3;
}
